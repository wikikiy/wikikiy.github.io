<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地电子书阅读器</title>
    
    <script src="https://cdn.jsdelivr.net/npm/jszip/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <style>
        :root {
            --bg-color: #f8f9fa;
            --panel-bg: #ffffff;
            --text-color: #333333;
            --border-color: #e0e0e0;
            --active-color: #007bff;
            --btn-bg: #007bff;
            --btn-text: #ffffff;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --border-color: #333333;
            --active-color: #bb86fc;
            --btn-bg: #bb86fc;
            --btn-text: #121212;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: background-color 0.3s, color 0.3s; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
        }

        .controls { display: flex; gap: 10px; }

        button, .file-label {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            background-color: var(--btn-bg);
            color: var(--btn-text);
        }

        .btn-danger { background-color: #dc3545; color: white; }
        #theme-toggle { background-color: #f1c40f; color: #2c3e50; }
        [data-theme="dark"] #theme-toggle { background-color: #9b59b6; color: #fff; }

        #file-input { display: none; }

        #upload-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .upload-box {
            border: 2px dashed var(--border-color);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            background-color: var(--panel-bg);
            max-width: 450px;
            width: 90%;
        }

        #loading-tip { display: none; color: var(--active-color); margin-top: 15px; font-weight: bold; }

        #reader-container { display: none; flex: 1; overflow: hidden; position: relative; }

        #m-toc-trigger {
            display: none; position: absolute; left: 0; top: 50%; transform: translateY(-50%); z-index: 90;
            padding: 12px 8px; background-color: var(--active-color); color: var(--btn-text);
            border-radius: 0 8px 8px 0; writing-mode: vertical-lr; font-size: 0.9rem; letter-spacing: 2px;
            box-shadow: 2px 0 8px rgba(0,0,0,0.15); cursor: pointer;
        }

        #sidebar {
            width: 280px; background-color: var(--panel-bg); border-right: 1px solid var(--border-color);
            overflow-y: auto; padding: 15px; z-index: 95; transition: transform 0.3s ease;
        }

        #sidebar h3 { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--border-color); }
        .toc-list { list-style: none; }
        .toc-item {
            padding: 10px; cursor: pointer; border-radius: 4px; margin-bottom: 5px; font-size: 0.95rem;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .toc-item:hover { background-color: var(--border-color); }
        .toc-item.active { background-color: var(--active-color); color: var(--btn-text); }

        #content-area { flex: 1; display: flex; flex-direction: column; background-color: var(--bg-color); position: relative; }
        #viewer { flex: 1; padding: 40px; overflow-y: auto; display: flex; justify-content: center; }
        #book-content { max-width: 800px; width: 100%; line-height: 1.8; font-size: 1.1rem; white-space: pre-wrap; }
        
        /* PDF 渲染特殊画布 */
        canvas { max-width: 100%; height: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); background: white; }

        #sidebar-overlay {
            display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4); z-index: 94;
        }

        .nav-bar {
            display: flex; justify-content: space-between; align-items: center; padding: 15px 30px;
            background-color: var(--panel-bg); border-top: 1px solid var(--border-color); z-index: 10;
        }

        @media (max-width: 768px) {
            #m-toc-trigger { display: block; }
            #sidebar { position: absolute; top: 0; bottom: 0; left: 0; width: 260px; transform: translateX(-100%); box-shadow: 4px 0 15px rgba(0,0,0,0.2); }
            #reader-container.toc-open #sidebar { transform: translateX(0); }
            #reader-container.toc-open #sidebar-overlay { display: block; }
            #viewer { padding: 20px 20px 20px 35px; }
            .nav-bar { padding: 10px 15px; }
        }
    </style>
</head>
<body>

    <header>
        <div style="font-size: 1.2rem; font-weight: bold;">Local Reader Pro</div>
        <div class="controls">
            <button id="theme-toggle" onclick="toggleTheme()">☀️ 切换模式</button>
            <button id="clear-btn" class="btn-danger" onclick="clearBook()" style="display: none;">清除书籍</button>
        </div>
    </header>

    <div id="upload-container">
        <div class="upload-box">
            <h2>欢迎阅读</h2>
            <p style="margin: 10px 0 20px; opacity: 0.7;">支持 EPUB / TXT / PDF / MOBI 格式</p>
            <label for="file-input" class="file-label">选择电子书上传</label>
            <input type="file" id="file-input" accept=".epub,.txt,.pdf,.mobi" onchange="handleFileUpload(event)">
            <div id="loading-tip">正在努力解析书籍中，请稍候...</div>
        </div>
    </div>

    <div id="reader-container">
        <div id="m-toc-trigger" onclick="toggleMobileToc(true)">📖 章节</div>
        <div id="sidebar-overlay" onclick="toggleMobileToc(false)"></div>

        <div id="sidebar">
            <h3>目录/页面</h3>
            <ul class="toc-list" id="toc"></ul>
        </div>
        
        <div id="content-area">
            <div id="viewer">
                <div id="book-content"></div>
            </div>
            <div class="nav-bar">
                <button onclick="prevPage()">上一页 (←)</button>
                <div id="page-display">进度: 计算中...</div>
                <button onclick="nextPage()">下一页 (→)</button>
            </div>
        </div>
    </div>

    <script>
        // 配置 PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let currentBook = null;
        let rendition = null;
        let pdfDoc = null;
        let bookType = ''; 
        let txtChapters = []; 
        let currentTxtIndex = 0; // 同时也用于 PDF 当前页码

        window.onload = function() {
            initTheme();
            try {
                const cachedBook = localStorage.getItem('local_book_data');
                const cachedName = localStorage.getItem('local_book_name');
                const cachedType = localStorage.getItem('local_book_type');

                if (cachedBook && cachedName && cachedType) {
                    bookType = cachedType;
                    showReaderView();
                    if (bookType === 'txt' || bookType === 'mobi') {
                        processTxt(cachedBook);
                    } else if (bookType === 'epub') {
                        openEpub(base64ToArrayBuffer(cachedBook));
                    }
                }
            } catch (e) { console.log("加载缓存失败:", e); }
        }

        function toggleMobileToc(show) {
            const container = document.getElementById('reader-container');
            if (show) container.classList.add('toc-open');
            else container.classList.remove('toc-open');
        }

        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeButton(savedTheme);
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeButton(newTheme);
            if (rendition && bookType === 'epub') setEpubTheme(newTheme);
            if (bookType === 'pdf') renderPdfPage(); // PDF 重新渲染以应用背景底色（如果需要）
        }

        function updateThemeButton(theme) {
            document.getElementById('theme-toggle').innerHTML = theme === 'dark' ? '🌙 深色模式' : '☀️ 浅色模式';
        }

        function setEpubTheme(theme) {
            if (!rendition) return;
            const color = theme === 'dark' ? '#e0e0e0' : '#333333';
            rendition.themes.default({
                'p': { 'color': `${color} !important` },
                'body': { 'color': `${color} !important` },
                'span': { 'color': `${color} !important` }
            });
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('loading-tip').style.display = 'block';
            const ext = file.name.split('.').pop().toLowerCase();
            const reader = new FileReader();

            if (ext === 'txt' || ext === 'mobi') {
                bookType = ext;
                reader.onload = function(e) {
                    let text = e.target.result;
                    if (ext === 'mobi') {
                        // 纯前端提取 MOBI 中的原生文本流骨架
                        text = decodeMobiText(e.target.result);
                    }
                    try {
                        localStorage.setItem('local_book_data', text);
                        localStorage.setItem('local_book_name', file.name);
                        localStorage.setItem('local_book_type', 'txt');
                    } catch (err) { console.warn('文件过大，跳过本地缓存保存'); }
                    processTxt(text);
                    showReaderView();
                };
                ext === 'txt' ? reader.readAsText(file, 'utf-8') : reader.readAsArrayBuffer(file);

            } else if (ext === 'epub') {
                bookType = 'epub';
                reader.onload = function(e) {
                    const arrayBuffer = e.target.result;
                    try {
                        localStorage.setItem('local_book_data', arrayBufferToBase64(arrayBuffer));
                        localStorage.setItem('local_book_name', file.name);
                        localStorage.setItem('local_book_type', 'epub');
                    } catch (err) { console.warn('文件过大，跳过缓存'); }
                    openEpub(arrayBuffer);
                    showReaderView();
                };
                reader.readAsArrayBuffer(file);

            } else if (ext === 'pdf') {
                bookType = 'pdf';
                reader.onload = function(e) {
                    openPdf(e.target.result);
                    showReaderView();
                };
                reader.readAsArrayBuffer(file);
            }
        }

        // ================= MOBI 解析核心（提取文本流） =================
        function decodeMobiText(arrayBuffer) {
            const view = new DataView(arrayBuffer);
            // 简单读取 PalmDOC 文本压缩流或原始文本段
            let text = "";
            try {
                const decoder = new TextDecoder('utf-8');
                // 粗暴提取可读的 HTML/TEXT 字符串段
                text = decoder.decode(new Uint8Array(arrayBuffer));
                // 清理掉不可读的二进制非文本噪声
                text = text.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, "").replace(/<[^>]+>/g, '\n');
            } catch(e) { text = "Mobi 文件解析失败或格式不兼容。"; }
            return text;
        }

        // ================= PDF 解析与渲染核心 =================
        function openPdf(arrayBuffer) {
            pdfjsLib.getDocument({ data: arrayBuffer }).promise.then(pdf => {
                pdfDoc = pdf;
                currentTxtIndex = 1; // PDF 页面从 1 开始
                
                // 自动生成 PDF 侧边栏页码目录
                const tocContainer = document.getElementById('toc');
                tocContainer.innerHTML = '';
                for (let i = 1; i <= pdf.numPages; i += Math.max(1, Math.floor(pdf.numPages / 50))) { // 最多显示50个快速跳转锚点
                    const li = document.createElement('li');
                    li.className = 'toc-item';
                    li.innerText = `第 ${i} 页`;
                    li.onclick = () => { currentTxtIndex = i; renderPdfPage(); toggleMobileToc(false); };
                    tocContainer.appendChild(li);
                }
                renderPdfPage();
            });
        }

        function renderPdfPage() {
            if (!pdfDoc) return;
            pdfDoc.getPage(currentTxtIndex).then(page => {
                const container = document.getElementById('book-content');
                container.innerHTML = ''; // 清空上一页
                
                const canvas = document.createElement('canvas');
                container.appendChild(canvas);
                const context = canvas.getContext('2d');

                // 动态适配浏览器缩放比例，保持高清
                const viewport = page.getViewport({ scale: window.devicePixelRatio || 1.5 });
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderContext = { canvasContext: context, viewport: viewport };
                page.render(renderContext);

                document.getElementById('page-display').innerText = `第 ${currentTxtIndex} / ${pdfDoc.numPages} 页`;
            });
        }

        // ================= TXT 和 MOBI 章节分段处理 =================
        function processTxt(text) {
            const chapterRegex = /(第[零一二三四五六七八九十百千\d]+[章节回集卷].*)/g;
            const lines = text.split('\n');
            txtChapters = [];
            let currentChapterTitle = "前言/正文";
            let currentContent = [];

            lines.forEach(line => {
                if (chapterRegex.test(line)) {
                    if (currentContent.length > 0) {
                        txtChapters.push({ title: currentChapterTitle, content: currentContent.join('\n') });
                    }
                    currentChapterTitle = line.trim();
                    currentContent = [];
                } else { currentContent.push(line); }
            });
            if (currentContent.length > 0) txtChapters.push({ title: currentChapterTitle, content: currentContent.join('\n') });

            const tocContainer = document.getElementById('toc');
            tocContainer.innerHTML = '';
            txtChapters.forEach((ch, index) => {
                const li = document.createElement('li');
                li.className = `toc-item ${index === 0 ? 'active' : ''}`;
                li.innerText = ch.title;
                li.onclick = () => { jumpToTxtChapter(index); toggleMobileToc(false); };
                tocContainer.appendChild(li);
            });

            currentTxtIndex = 0;
            renderTxtChapter();
        }

        function renderTxtChapter() {
            if(txtChapters.length === 0) return;
            document.getElementById('book-content').innerHTML = txtChapters[currentTxtIndex].content;
            document.getElementById('page-display').innerText = `第 ${currentTxtIndex + 1} / ${txtChapters.length} 章`;
            
            const items = document.querySelectorAll('.toc-item');
            items.forEach((item, idx) => {
                if(idx === currentTxtIndex) item.classList.add('active');
                else item.classList.remove('active');
            });
            document.getElementById('viewer').scrollTop = 0;
        }

        function jumpToTxtChapter(index) { currentTxtIndex = index; renderTxtChapter(); }

        // ================= EPUB 解析核心 =================
        function openEpub(bookData) {
            document.getElementById('book-content').innerHTML = ''; 
            currentBook = ePub(bookData);
            rendition = currentBook.renderTo("book-content", { width: "100%", height: "100%", spread: "none" });
            rendition.display();

            currentBook.ready.then(() => currentBook.locations.generate(1024)).then(() => updateEpubProgress());

            currentBook.loaded.navigation.then(nav => {
                const tocContainer = document.getElementById('toc');
                tocContainer.innerHTML = '';
                nav.forEach(chapter => {
                    const li = document.createElement('li');
                    li.className = 'toc-item';
                    li.innerText = chapter.label.trim();
                    li.onclick = () => { rendition.display(chapter.href); toggleMobileToc(false); };
                    tocContainer.appendChild(li);
                });
            });

            rendition.on("relocated", location => updateEpubProgress(location));
            rendition.on("keydown", (event) => {
                if (event.key === 'ArrowLeft') prevPage();
                else if (event.key === 'ArrowRight') nextPage();
            });
            setEpubTheme(document.documentElement.getAttribute('data-theme'));
        }

        function updateEpubProgress(location) {
            if (!rendition || !currentBook) return;
            const currentLocation = location || rendition.currentLocation();
            if (currentLocation && currentLocation.start) {
                const cfi = currentLocation.start.cfi;
                const percentage = currentBook.locations.percentageFromCfi(cfi);
                document.getElementById('page-display').innerText = `进度: ${Math.min(Math.max(Math.round(percentage * 100), 0), 100)}%`;
            }
        }

        // ================= 翻页路由控制 =================
        function prevPage() {
            if (bookType === 'txt' || bookType === 'mobi') {
                if (currentTxtIndex > 0) { currentTxtIndex--; renderTxtChapter(); }
            } else if (bookType === 'epub' && rendition) {
                rendition.prev();
            } else if (bookType === 'pdf') {
                if (currentTxtIndex > 1) { currentTxtIndex--; renderPdfPage(); }
            }
        }

        function nextPage() {
            if (bookType === 'txt' || bookType === 'mobi') {
                if (currentTxtIndex < txtChapters.length - 1) { currentTxtIndex++; renderTxtChapter(); }
            } else if (bookType === 'epub' && rendition) {
                rendition.next();
            } else if (bookType === 'pdf') {
                if (currentTxtIndex < pdfDoc.numPages) { currentTxtIndex++; renderPdfPage(); }
            }
        }

        // 全局键盘监听
        document.addEventListener('keydown', function(event) {
            if (document.getElementById('reader-container').style.display === 'flex') {
                if (event.key === 'ArrowLeft') prevPage();
                else if (event.key === 'ArrowRight') nextPage();
            }
        });

        function showReaderView() {
            document.getElementById('upload-container').style.display = 'none';
            document.getElementById('reader-container').style.display = 'flex';
            document.getElementById('clear-btn').style.display = 'inline-block';
            document.getElementById('loading-tip').style.display = 'none';
        }

        function clearBook() {
            localStorage.clear();
            alert('本地缓存已清除！');
            window.location.reload();
        }

        function arrayBufferToBase64(buffer) {
            let binary = '';
            const bytes = new Uint8Array(buffer);
            for (let i = 0; i < bytes.byteLength; i++) { binary += String.fromCharCode(bytes[i]); }
            return window.btoa(binary);
        }

        function base64ToArrayBuffer(base64) {
            const binaryString = window.atob(base64);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) { bytes[i] = binaryString.charCodeAt(i); }
            return bytes.buffer;
        }
    </script>
</body>
</html>
